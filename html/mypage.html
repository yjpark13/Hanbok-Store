<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/mypage.css" />
    <script src="../js/mypage.js" defer></script>
    <title>마이페이지</title>
  </head>

  <body>
    <div class="mypage-container">
      <h1>입력정보</h1>
      <div class="mypage-box" id="mypageBox">
        <p class="mypage-item">이름: <span id="userName"></span></p>
        <p class="mypage-item">아이디: <span id="userId"></span></p>
        <p class="mypage-item">이메일: <span id="email"></span></p>
        <p class="mypage-item">전화번호: <span id="phoneNumber"></span></p>
        <p class="mypage-item">우편번호: <span id="postcode"></span></p>
        <p class="mypage-item">주소: <span id="address"></span></p>
        <p class="mypage-item">상세주소: <span id="detailAddress"></span></p>
        <p class="mypage-item">가입 유형: <span id="loginType"></span></p>
        <p class="mypage-item">가입 방식: <span id="provider"></span></p>
      </div>
      <button type="button" id="logoutBtn">로그아웃</button>
    </div>
  </body>
</html>
