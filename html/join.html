<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/join.css" />
    <script src="./js/join.js" defer></script>
    <title>회원가입</title>
  </head>
<body>
    <div class="join-container">
        <h1>회원가입</h1>
        <form>
            <fieldset class="join-box">
                <div class="join-box__input">
                    <label for="userName">이름</label>
                    <input type="text" id="userName" name="userName" placeholder="이름을 입력해주세요." />
                </div>

                <div class="join-box__input">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" name="userId" placeholder="아이디를 입력해주세요." />
                </div>

                <div class="join-box__input">
                    <label for="userPw">비밀번호</label>
                    <input type="password" id="userPw" name="userPw" placeholder="비밀번호를 입력해주세요." />
                </div>

                <div class="join-box__input">
                    <label for="userPwCheck">비밀번호 확인</label>
                    <input type="password" id="userPwCheck" name="userPwCheck" placeholder="비밀번호를 다시 입력해주세요." />
                </div>

                <div class="join-box__input">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력해주세요." />
                </div>
            </fieldset>

            <section class="join-box">
        </form>
    </div>
  <!-- 회원가입 페이지에 필요한 ID목록
userName
userId
userPw
userPwCheck
email
phone
postcode
address
detailAddress
deliveryMemo

joinBtn
joinResult -->
</html>
