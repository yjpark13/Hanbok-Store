<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/floating-nav.css" />
    <link rel="stylesheet" href="../css/commonforloginjoinmypage.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <script src="../js/login.js" defer></script>
    <title>로그인</title>
  </head>

  <body>
    <div class="login-container">
      <form id="loginForm">
        <fieldset class="login-box">
          <legend>로그인</legend>

          <div class="login-box__input">
            <label for="loginId">아이디</label>
            <input
              type="text"
              id="loginId"
              name="loginId"
              placeholder="아이디를 입력해주세요."
            />
          </div>

          <div class="login-box__input">
            <label for="loginPw">비밀번호</label>
            <input
              type="password"
              id="loginPw"
              name="loginPw"
              placeholder="비밀번호를 입력해주세요."
            />
          </div>
          <div class="button-container">
            <div class="social-login">
              <button type="button" id="kakaoLoginBtn">카카오 로그인</button>
              <button type="button" id="naverLoginBtn">네이버 로그인</button>
              <button type="button" id="googleLoginBtn">구글 로그인</button>
            </div>

            <div class="login-button-box">
              <button type="submit" id="loginBtn">로그인</button>
              <button type="button" id="registerBtn">회원가입</button>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
    <nav class="floating-nav">
      <a href="index.html">
        <img src="../image/icons/home.png" alt="Home" />
      </a>

      <a href="products.html">
        <img src="../image/icons/category.png" alt="Category" />
      </a>

      <a href="cart.html">
        <img src="../image/icons/cart.png" alt="Cart" />
      </a>

      <a href="login.html">
        <img src="../image/icons/login.png" alt="Login" />
      </a>

      <a href="mypage.html">
        <img src="../image/icons/mypage.png" alt="Mypage" />
      </a>

      <a href="qna.html">
        <img src="../image/icons/qna.png" alt="Q&A" />
      </a>

      <a href="review.html">
        <img src="../image/icons/review.png" alt="Review" />
      </a>
    </nav>
  </body>
</html>
