<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanbok Store</title>
    <link rel="stylesheet" href="../css/floating-nav.css">
    <link rel="stylesheet" href="../css/index.css">
    <script src="../js/index.js" defer></script>
</head>
<body>
    <nav class="floating-nav">
  <a href="index.html">
    <img src="../image/icons/home.png" alt="Home">
  </a>

  <a href="products.html">
    <img src="../image/icons/category.png" alt="Category">
  </a>

  <a href="cart.html">
    <img src="../image/icons/cart.png" alt="Cart">
  </a>

  <a href="login.html">
    <img src="../image/icons/login.png" alt="Login">
  </a>

  <a href="mypage.html">
    <img src="../image/icons/mypage.png" alt="Mypage">
  </a>

  <a href="qna.html">
    <img src="../image/icons/qna.png" alt="Q&A">
  </a>

  <a href="review.html">
    <img src="../image/icons/review.png" alt="Review">
  </a>
</nav>

<div class="container">

    <!-- Header -->
    <header class="main-header">

        <div class="header-left">

            <h1>Hanbok Store</h1>

            <h2>당신만의 특별한 한복을 만나보세요.</h2>

            <p>
                전통의 아름다움과 현대적인 감성을 담은
                다양한 한복을 쉽고 빠르게 찾아보세요.
            </p>

        </div>

    </header>

    <main>

        <!-- 검색 -->
        <section class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="상품명을 입력하세요">

            <button id="searchBtn">
                검색
            </button>

        </section>

        <!-- 카테고리 -->
        <section class="category">

            <button class="categoryBtn" data-category="전체">전체</button>

            <button class="categoryBtn" data-category="아동한복">아동한복</button>

            <button class="categoryBtn" data-category="개량한복">개량한복</button>

            <button class="categoryBtn" data-category="결혼한복">결혼한복</button>

            <button class="categoryBtn" data-category="생활한복">생활한복</button>

        </section>

        <!-- 추천상품 + Today's Pick -->
        <section class="main-product-area">

            <!-- 추천상품 -->
            <div class="recommend-section">

                <h2>⭐ 추천 상품</h2>

                <div id="recommendList" class="card-wrap">

                </div>

            </div>

            <!-- Today's Pick -->
            <aside class="today-pick">

                <h2>👘 Today's Pick</h2>

                <div class="pick-card">

                    <img src="../image/hanbok1.png" alt="Today's Pick">

                    <h3>궁중 한복 세트</h3>

                    <p>
                        왕실의 우아함을 담은
                        프리미엄 한복입니다.
                    </p>

                    <strong>250,000원</strong>

                    <button type="button">
                        상세보기
                    </button>

                </div>

            </aside>

        </section>

        <!-- 전체 상품 -->
        <section class="product-section">

            <h2>📦 전체 상품</h2>

            <div id="productList" class="card-wrap">

            </div>

        </section>

        <!-- 상세보기 -->
        <section class="detail-section">

            <h2>📄 상품 상세 정보</h2>

            <div id="detail">

                <p>
                    상품을 선택하면 상세 정보가 표시됩니다.
                </p>

            </div>

        </section>

    </main>

</div>

</body>
</html>
